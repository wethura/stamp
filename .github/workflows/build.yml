name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: pyinstaller StampTool-win.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: StampTool-Windows
          path: dist/StampTool.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller -y StampTool.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: StampTool-macOS
          path: dist/StampTool.app
